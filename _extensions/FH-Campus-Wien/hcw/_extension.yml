title: HCW
author: Hochschule Campus Wien
version: 0.1.1
quarto-required: ">=1.8.0"
contributes:
  formats:
    pdf:
      documentclass: scrartcl
      pdf-engine: lualatex
      latex-auto-install: false
      papersize: a4
      fontsize: 11pt
      mainfont: TeX Gyre Heros
      sansfont: TeX Gyre Heros
      monofont: Latin Modern Mono
      geometry:
        - top=25mm
        - bottom=25mm
        - left=25mm
        - right=25mm
        - headheight=15pt
        - includeheadfoot
      colorlinks: true
      linkcolor: HCWAnthrazit
      urlcolor: HCWAnthrazit
      citecolor: HCWAnthrazit
      template-partials:
        - title.tex
      include-in-header:
        - header.tex
